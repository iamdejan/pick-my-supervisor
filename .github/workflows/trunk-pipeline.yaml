name: Trunk Pipeline
on:
  push:
    branches:
      - main

jobs:
  backend:
    strategy:
      matrix:
        os: ['ubuntu-slim']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/backend
      - name: Run cargo fmt
        run: cargo fmt --check
        working-directory: apps/backend
      - name: Run cargo clippy (release)
        run: cargo clippy --release -- -D warnings
        working-directory: apps/backend
      - name: Run cargo build (release)
        run: cargo build --release
        working-directory: apps/backend
      - name: Run cargo test (release)
        run: cargo test --release
        working-directory: apps/backend
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-binary
          path: apps/backend/target/release/main

  backend-deploy:
    runs-on: ubuntu-slim
    needs: backend
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: backend-release-binary
          path: apps/backend/target/release/
      - name: Make binary executable
        run: chmod +x apps/backend/target/release/main
      - name: Install Tree Utility
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tree
      - name: View Backend Directory Structure
        run: 'tree -L 3 ./apps/backend'
      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'
      - name: 'Set up cloud SDK'
        uses: google-github-actions/setup-gcloud@v3
      - name: 'Deploy to Cloud Run'
        run: 'gcloud run deploy pick-my-supervisor --source ./apps/backend --region asia-southeast1 --allow-unauthenticated --set-env-vars HOST=${{ vars.HOST }},OPENROUTER_BASE_URL=${{ vars.OPENROUTER_BASE_URL }},QDRANT_CLUSTER_ENDPOINT=${{ secrets.QDRANT_CLUSTER_ENDPOINT }} --set-secrets="QDRANT_API_KEY=qdrant-api-key:latest,OPENROUTER_API_KEY=openrouter-api-key:latest"'

  frontend:
    strategy:
      matrix:
        os: ['ubuntu-slim']
        node_version: ['24.18.0']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          check-latest: false
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Install PNPM
        run: npm install --global pnpm@11.9.0
      - name: Install dependencies
        run: pnpm install
      - name: Check Typings
        run: pnpm --filter frontend run type:check
      - name: Run lint
        run: pnpm --filter frontend run lint
      - name: Run test
        run: pnpm --filter frontend run test:ci
